# NAME: AppleTV
# REPO: https://github.com/lylywayr/proxy-rulesets
# UPDATED: 2026-07-05T06:00:59.975572+00:00
no_resolve: true
domain_set:
  - "hls-amt.itunes.apple.com"
  - "hls.itunes.apple.com"
  - "np-edge.itunes.apple.com"
  - "play-edge.itunes.apple.com"
  - "tv.applemusic.com"
  - "uts-api.itunes.apple.com"
domain_suffix_set:
  - "tv.apple.com"
user_agent_set:
  - "AppleTV*"
  - "com.apple.tv*"
