# NAME: GoogleDrive
# REPO: https://github.com/lylywayr/proxy-rulesets
# UPDATED: 2026-07-05T08:54:54.876055+00:00
no_resolve: true
domain_set:
  - "www.googleapis.com"
domain_suffix_set:
  - "googledrive.com"
  - "googleusercontent.com"
  - "docs.google.com"
  - "drive.google.com"
user_agent_set:
  - "%E4%BA%91%E7%AB%AF%E7%A1%AC%E7%9B%98*"
  - "*com.google.Drive*"
  - "Google.Drive*"
