<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>proxy-rulesets</title>
  <meta name="description" content="按分类浏览具体规则集的静态导航页。">
  <link rel="stylesheet" href="./assets/site.css">
</head>
<body>
  <div class="page-shell">
    <header class="topbar">
      <div>
        <p class="eyebrow">proxy-rulesets</p>
        <h1>规则分类与规则集</h1>
        <p class="lede">按分类查看具体规则集，仅保留规则说明与原始文件入口。</p>
        <p class="timestamp" id="generated-at"></p>
      </div>
      <div class="toolbar">
        <button id="lang-zh" class="toolbar-btn is-active" type="button">中文</button>
        <button id="lang-en" class="toolbar-btn" type="button">EN</button>
        <a class="toolbar-link" href="https://lylywayr.github.io/proxy-rulesets/" target="_blank" rel="noreferrer">Pages</a>
        <a class="toolbar-link" href="./README.md" target="_blank" rel="noreferrer">README</a>
      </div>
    </header>

    <section class="summary-band" id="summary-band"></section>

    <section class="controls-band">
      <div class="control-block search-block">
        <label for="search-input">搜索规则集</label>
        <input id="search-input" type="search" placeholder="分类名 / 原名 / 规则集">
      </div>
      <div class="control-block">
        <label for="group-filter">分类</label>
        <select id="group-filter"></select>
      </div>
    </section>

    <main class="main-grid">
      <section class="content-panel">
        <div class="section-head">
          <h2>分类列表</h2>
          <p id="result-count"></p>
        </div>
        <div id="category-grid" class="group-stack"></div>
      </section>
    </main>
  </div>

  <script src="./assets/site-data.js"></script>
  <script src="./assets/site.js"></script>
</body>
</html>
